<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <title>TABUMU GAME</title>
</head>

<body>
    <div id="app">
        <!-- Phaser Game Container (hidden initially or under UI) -->
        <div id="game-container"></div>
        
        <!-- UI Layer Overlay -->
        <div id="ui-layer" class="ui-layer">
            <div class="top-bar">
                <button id="settings-btn" class="icon-btn" title="Settings">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
            </div>
            
            <div class="main-menu-content">
                <div class="logo-container">
                    <h1 class="game-logo">TABUMU<span class="highlight"> GAME</span></h1>
                    <div class="logo-subtitle">Multiplayer Snake Game</div>
                </div>
                
                <div class="play-section">
                    <div class="input-group">
                        <input type="text" id="nickname-input" placeholder="Enter Nickname" maxlength="16" autocomplete="off" />
                    </div>
                    
                    <div class="button-group">
                        <button id="play-btn" class="primary-btn">PLAY NOW</button>
                        <button id="servers-btn" class="secondary-btn">
                            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="12" x2="2" y2="12"></line>
                                <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path>
                                <line x1="6" y1="16" x2="6.01" y2="16"></line>
                                <line x1="10" y1="16" x2="10.01" y2="16"></line>
                            </svg>
                            Servers
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Servers Modal -->
        <div id="servers-modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Select Server</h2>
                    <button class="close-btn" id="close-servers-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <ul class="server-list" id="server-list">
                        <li class="server-item selected" data-server="ws://localhost:8080">
                            <div class="server-info">
                                <span class="server-region">Local Server</span>
                                <span class="server-status active">Online</span>
                            </div>
                            <span class="server-ping">12ms</span>
                        </li>
                        <li class="server-item" data-server="wss://eu.example.com">
                            <div class="server-info">
                                <span class="server-region">EU Central</span>
                                <span class="server-status active">Online</span>
                            </div>
                            <span class="server-ping">45ms</span>
                        </li>
                        <li class="server-item" data-server="wss://us.example.com">
                            <div class="server-info">
                                <span class="server-region">US East</span>
                                <span class="server-status active">Online</span>
                            </div>
                            <span class="server-ping">120ms</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
